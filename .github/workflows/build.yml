name: Build asynk.exe

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.3'
          cache: true

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy Qt DLLs
        shell: cmd
        run: |
          mkdir deploy
          copy build\Release\asynk.exe deploy\
          windeployqt deploy\asynk.exe

      - name: Upload asynk.exe
        uses: actions/upload-artifact@v4
        with:
          name: asynk-windows
          path: deploy/
